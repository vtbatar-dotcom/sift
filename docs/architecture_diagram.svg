<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">SIFT Sentinel Architecture</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#666">Trust boundaries marked with dashed red lines</text>

  <!-- Coordinator box -->
  <rect x="250" y="70" width="400" height="60" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-weight="bold" fill="#1a73e8">COORDINATOR</text>
  <text x="450" y="112" text-anchor="middle" font-size="11" fill="#555">Deterministic Python · Max iterations cap · Report assembly</text>

  <!-- Trust boundary: Analyst/Skeptic separation -->
  <rect x="130" y="150" width="640" height="130" rx="6" fill="none" stroke="#d93025" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="168" font-size="10" fill="#d93025" font-weight="bold">TRUST BOUNDARY: Separate context windows</text>

  <!-- Analyst -->
  <rect x="160" y="180" width="260" height="80" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="290" y="205" text-anchor="middle" font-weight="bold" fill="#c5221f">ANALYST (Claude)</text>
  <text x="290" y="222" text-anchor="middle" font-size="11" fill="#555">Produces findings</text>
  <text x="290" y="238" text-anchor="middle" font-size="11" fill="#555">Must cite every claim</text>
  <text x="290" y="254" text-anchor="middle" font-size="10" fill="#888">All MCP tools</text>

  <!-- Skeptic -->
  <rect x="480" y="180" width="260" height="80" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="610" y="205" text-anchor="middle" font-weight="bold" fill="#0d652d">SKEPTIC (Claude)</text>
  <text x="610" y="222" text-anchor="middle" font-size="11" fill="#555">Re-verifies citations</text>
  <text x="610" y="238" text-anchor="middle" font-size="11" fill="#555">Rejects unsupported claims</text>
  <text x="610" y="254" text-anchor="middle" font-size="10" fill="#888">Verification tools only</text>

  <!-- Arrows between Analyst and Skeptic -->
  <line x1="420" y1="205" x2="478" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="449" y="200" text-anchor="middle" font-size="9" fill="#555">finding</text>
  <line x1="478" y1="240" x2="420" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="449" y="253" text-anchor="middle" font-size="9" fill="#555">feedback</text>

  <!-- Coordinator arrows -->
  <line x1="370" y1="130" x2="290" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="130" x2="610" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Trust boundary: MCP Server -->
  <rect x="130" y="300" width="640" height="100" rx="6" fill="none" stroke="#d93025" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="318" font-size="10" fill="#d93025" font-weight="bold">TRUST BOUNDARY: No shell · No write · No exec</text>

  <!-- MCP Server -->
  <rect x="160" y="325" width="580" height="60" rx="6" fill="#fff3e0" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-weight="bold" fill="#e37400">SIFT SENTINEL MCP SERVER</text>
  <text x="450" y="368" text-anchor="middle" font-size="11" fill="#555">Typed read-only DFIR tools · Path guard · Output bounds · No subprocess injection</text>

  <!-- MCP tool calls arrows -->
  <line x1="290" y1="260" x2="290" y2="323" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="295" y="295" font-size="9" fill="#555">MCP tool calls</text>
  <line x1="610" y1="260" x2="610" y2="323" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="295" font-size="9" fill="#555">re-verify only</text>

  <!-- Trust boundary: Evidence Vault -->
  <rect x="130" y="420" width="640" height="100" rx="6" fill="none" stroke="#d93025" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="438" font-size="10" fill="#d93025" font-weight="bold">TRUST BOUNDARY: Read-only bind mount · Hash verified</text>

  <!-- Evidence Vault -->
  <rect x="160" y="445" width="580" height="60" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="450" y="470" text-anchor="middle" font-weight="bold" fill="#6a1b9a">EVIDENCE VAULT  /evidence/ (ro,noexec,nosuid)</text>
  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#555">nps-2008-jean.E01 · E02 · SHA-256 manifest · Hash at start = Hash at end</text>

  <!-- Vault arrow -->
  <line x1="450" y1="385" x2="450" y2="443" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="455" y="418" font-size="9" fill="#555">read-only syscalls</text>

  <!-- Outputs -->
  <rect x="160" y="545" width="170" height="50" rx="6" fill="#e8eaed" stroke="#999" stroke-width="1"/>
  <text x="245" y="567" text-anchor="middle" font-size="11" fill="#333">Execution Log (JSONL)</text>
  <text x="245" y="582" text-anchor="middle" font-size="10" fill="#666">every tool call logged</text>

  <rect x="365" y="545" width="170" height="50" rx="6" fill="#e8eaed" stroke="#999" stroke-width="1"/>
  <text x="450" y="567" text-anchor="middle" font-size="11" fill="#333">Iteration Traces</text>
  <text x="450" y="582" text-anchor="middle" font-size="10" fill="#666">draft → reject → revise</text>

  <rect x="570" y="545" width="170" height="50" rx="6" fill="#e8eaed" stroke="#999" stroke-width="1"/>
  <text x="655" y="567" text-anchor="middle" font-size="11" fill="#333">Report (MD + JSON)</text>
  <text x="655" y="582" text-anchor="middle" font-size="10" fill="#666">citations + hash chain</text>

  <!-- Output arrows -->
  <line x1="350" y1="130" x2="245" y2="543" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="450" y1="130" x2="450" y2="543" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="550" y1="130" x2="655" y2="543" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Schema enforcement callout -->
  <rect x="20" y="190" width="105" height="55" rx="4" fill="#fef7e0" stroke="#f9ab00" stroke-width="1"/>
  <text x="72" y="210" text-anchor="middle" font-size="10" fill="#e37400" font-weight="bold">SCHEMA</text>
  <text x="72" y="224" text-anchor="middle" font-size="9" fill="#555">Finding must</text>
  <text x="72" y="236" text-anchor="middle" font-size="9" fill="#555">have ≥1 citation</text>

  <line x1="125" y1="217" x2="158" y2="217" stroke="#f9ab00" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="20" y="630" font-size="10" fill="#666">Legend:</text>
  <line x1="70" y1="627" x2="100" y2="627" stroke="#d93025" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="105" y="631" font-size="10" fill="#666">Architectural trust boundary</text>
  <line x1="280" y1="627" x2="310" y2="627" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="315" y="631" font-size="10" fill="#666">Data flow</text>
</svg>
